<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Gallery | Selvi Couture House</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Preloader -->
    <div id="preloader">
        <div class="loader-content">
            <i class="fas fa-scissors loader-icon"></i>
            <h2 class="loader-text">Selvi Couture House</h2>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-scissors"></i> Selvi Couture House
            </a>
            <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link" data-i18n="nav.home">Home</a></li>
                <li><a href="about.html" class="nav-link" data-i18n="nav.about">About</a></li>
                <li><a href="services.html" class="nav-link" data-i18n="nav.services">Services</a></li>
                <li><a href="gallery.html" class="nav-link active" data-i18n="nav.gallery">Gallery</a></li>
                <li><a href="pricing.html" class="nav-link" data-i18n="nav.pricing">Pricing</a></li>
                <li><a href="track.html" class="nav-link">Track Order</a></li>
                <li><a href="contact.html" class="nav-link" data-i18n="nav.contact">Contact</a></li>
                <li><button id="lang-toggle" class="btn btn-gold" style="padding: 0.4rem 1rem;">தமிழ்</button></li>
            </ul>
        </div>
    </nav>

    <header class="page-header"
        style="background: var(--primary-maroon); padding: 8rem 0 4rem; text-align: center; color: white;">
        <div class="container">
            <h1 style="font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 1rem;">Design Gallery
            </h1>
            <p style="opacity: 0.8; font-size: 1.2rem;">Our latest creations for inspiration</p>
        </div>
    </header>

    <!-- Gallery Section -->
    <section id="gallery" class="section" style="background: var(--white);">
        <div class="container">
            <div class="gallery-filters" style="margin-bottom: 3rem;">
                <button class="filter-btn active">All</button>
                <button class="filter-btn">Blouses</button>
                <button class="filter-btn">Bridal</button>
                <button class="filter-btn">Salwars</button>
                <button class="filter-btn">Gowns</button>
            </div>
            <div class="gallery-grid reveal">
                <div class="gallery-item" data-category="blouses"><img
                        src="https://images.unsplash.com/photo-1598554747436-b92455353592?auto=format&fit=crop&w=400&q=80"
                        alt="Design 1" loading="lazy" decoding="async"></div>
                <div class="gallery-item" data-category="bridal"><img
                        src="https://images.unsplash.com/photo-1596489392215-66170823577d?auto=format&fit=crop&w=400&q=80"
                        alt="Design 2" loading="lazy" decoding="async"></div>
                <div class="gallery-item" data-category="salwars"><img
                        src="https://images.unsplash.com/photo-1620799140408-ed5341cd2431?auto=format&fit=crop&w=400&q=80"
                        alt="Design 3" loading="lazy" decoding="async"></div>
                <div class="gallery-item" data-category="gowns"><img
                        src="https://images.unsplash.com/photo-1556905055-8f358a7a47b2?auto=format&fit=crop&w=400&q=80"
                        alt="Design 4" loading="lazy" decoding="async"></div>
                <div class="gallery-item" data-category="blouses"><img
                        src="https://images.unsplash.com/photo-1591369822096-ffd140ec948f?auto=format&fit=crop&w=400&q=80"
                        alt="Design 5" loading="lazy" decoding="async"></div>
                <div class="gallery-item" data-category="bridal"><img
                        src="https://images.unsplash.com/photo-1585123334904-845d60e97b29?auto=format&fit=crop&w=400&q=80"
                        alt="Design 6" loading="lazy" decoding="async"></div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Selvi Couture House. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <span class="close-lightbox">&times;</span>
        <img class="lightbox-img" id="lightbox-img">
        <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>

    <script type="module" src="main.js"></script>
</body>

</html>
