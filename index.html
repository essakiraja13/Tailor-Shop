<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selvi Couture House | Exclusive Ladies &amp; Bridal Studio</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#800000" />
  <meta name="description" content="Exclusive Ladies &amp; Bridal tailoring services in Tamil Nadu. Designer Blouses, Gowns, and Wedding wear. Perfect fit, on-time delivery." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://selvicouture.com/" />
  <meta property="og:title" content="Selvi Couture House | Premium Ladies Boutique" />
  <meta property="og:description" content="Expert Aari work, Bridal Stitching, and Designer Gowns in Tamil Nadu." />
  <meta property="og:image" content="https://selvicouture.com/assets/images/hero-banner.webp" />

  <!-- Preload Hero -->
  <link rel="preload" as="image" href="/assets/images/hero-banner.webp" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" media="print" onload="this.media='all'" />
</head>
<body>
  <div id="root">
    <div id="preloader" style="opacity: 1; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #F5F1EB; z-index: 9999; display: flex; justify-content: center; align-items: center;">
      <div style="text-align: center;">
        <img src="/assets/images/logo.png" alt="Selvi Couture House Loader" style="height: 100px; animation: pulse 1.5s infinite;" />
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[PWA] Service Worker registered:', reg.scope))
          .catch(err => console.log('[PWA] SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
